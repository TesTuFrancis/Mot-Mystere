<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Mot Mystère</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}

    body{
      background:#1a3a1a;color:#f0eee8;
      font-family:'Space Grotesk',sans-serif;
      height:100dvh;display:flex;flex-direction:column;
      align-items:center;padding:14px 16px 10px;gap:10px;overflow:hidden;
    }

    header{text-align:center;flex-shrink:0;}
    header h1{font-size:1.45rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#e8f5e8;}
    header p{margin-top:2px;font-size:.7rem;color:#7aaa7a;letter-spacing:.04em;}

    .legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:#9aba9a;}
    .legend-box{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.65rem;}
    .lb-absent {background:#2a3a2a;color:#4a6a4a;border:2px solid #2a4a2a;}
    .lb-present{background:#7c6a00;color:#ffd166;border:2px solid #ffd166;}
    .lb-correct{background:#145a32;color:#2ecc71;border:2px solid #2ecc71;}

    /* ── GRILLE ── */
    #grid{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
    .row{display:flex;gap:6px;}
    .cell{
      width:48px;height:48px;border-radius:6px;
      display:flex;align-items:center;justify-content:center;
      font-size:1.3rem;font-weight:700;text-transform:uppercase;
      border:2px solid #2a4a2a;background:#122212;color:#e8f5e8;
      cursor:default;transition:border-color .15s,background .15s;
      position:relative;
    }
    /* case active (curseur posé dessus) */
    .cell.cursor{
      border-color:#ffffff !important;
      background:#1e3a1e !important;
      box-shadow:0 0 0 2px rgba(255,255,255,.25);
    }
    .cell.filled{border-color:#6aaa6a;}
    .cell.absent {background:#2a3a2a;color:#4a6a4a;border-color:#2a4a2a;}
    .cell.present{background:#7c6a00;color:#ffd166;border-color:#ffd166;}
    .cell.correct{background:#145a32;color:#2ecc71;border-color:#2ecc71;}
    .cell.shake{animation:shake .4s ease;}
    /* cases cliquables sur la ligne active */
    .cell.editable{cursor:pointer;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

    #message{min-height:18px;font-size:.82rem;font-weight:600;text-align:center;padding:0 8px;flex-shrink:0;color:#ffd166;}
    #message.error{color:#ff6b6b;}
    #message.success{color:#2ecc71;}

    #keyboard-zone{
      width:100%;max-width:420px;
      display:flex;flex-direction:column;align-items:center;
      gap:6px;flex-shrink:0;margin-top:auto;
    }
    #loading-hint{font-size:.7rem;color:#7aaa7a;min-height:14px;text-align:center;}
    #keyboard{display:flex;flex-direction:column;gap:5px;width:100%;}
    .kb-row{display:flex;gap:4px;justify-content:center;}
    .kb-key{
      flex:1;max-width:36px;height:46px;border-radius:5px;
      display:flex;align-items:center;justify-content:center;
      font-size:.78rem;font-weight:700;text-transform:uppercase;
      background:#2a3a2a;color:#c8e8c8;border:1px solid #3a5a3a;
      cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
      transition:background .12s,color .12s;
    }
    .kb-key.wide-del{max-width:48px;font-size:1rem;}
    .kb-key.wide-val{max-width:72px;font-size:.68rem;background:#1a6a1a;color:#fff;border-color:#2ecc71;}
    .kb-key:active{filter:brightness(1.3);}
    .kb-key.absent {background:#1a2a1a;color:#3a5a3a;border-color:#1a3a1a;}
    .kb-key.present{background:#7c6a00;color:#ffd166;border-color:#ffd166;}
    .kb-key.correct{background:#145a32;color:#2ecc71;border-color:#2ecc71;}

    /* ── ÉCRAN VICTOIRE avec fade ── */
    #win-screen{
      position:fixed;inset:0;
      background:#0d200d;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:0;z-index:200;overflow:hidden;
      opacity:0;pointer-events:none;
      transition:opacity .7s ease;
    }
    #win-screen.show{opacity:1;pointer-events:all;}

    #win-img{
      width:100%;max-width:420px;
      flex:1;min-height:0;
      object-fit:cover;object-position:top center;
    }
    #win-caption{
      width:100%;max-width:420px;
      background:linear-gradient(135deg,#0d200d 0%,#1a4a1a 50%,#0d200d 100%);
      padding:18px 24px 22px;text-align:center;flex-shrink:0;
    }
    #win-caption .stars{font-size:1.5rem;letter-spacing:4px;margin-bottom:6px;}
    #win-caption .bravo{
      font-size:1.5rem;font-weight:700;color:#2ecc71;
      text-shadow:0 0 20px rgba(46,204,113,.6);
      margin-bottom:3px;letter-spacing:.05em;
    }
    #win-caption .essais{font-size:.82rem;color:#9aba9a;margin-bottom:14px;}
    #win-next{
      background:#2ecc71;color:#0a1a0a;border:none;border-radius:10px;
      font-family:'Space Grotesk',sans-serif;
      font-size:1rem;font-weight:700;padding:12px 34px;
      cursor:pointer;letter-spacing:.04em;
    }
    #win-next:hover{background:#27b560;}

    /* ── LOADING ── */
    #loading{
      position:fixed;inset:0;background:#0d200d;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;z-index:100;
    }
    #loading p{color:#7aaa7a;font-size:.9rem;}
    .spinner{width:36px;height:36px;border:3px solid #2a4a2a;border-top-color:#2ecc71;border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>

// ── Shuffle de Fisher-Yates avec graine temporelle ───────────────────────
// Mélange le tableau à chaque lancement → premier mot toujours différent
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
// SW est mélangé une fois au chargement de la page

const LS_LAST='mm_last';
function saveLastWord(w){try{localStorage.setItem(LS_LAST,w);}catch{}}
function loadLastWord(){try{return localStorage.getItem(LS_LAST)||'';}catch{return '';}}

// ── Mots trouvés ──────────────────────────────────────────────────────────
const LS_FOUND='mm_found';
function loadFound(){try{const s=localStorage.getItem(LS_FOUND);return s?JSON.parse(s):[];}catch{return [];}}
function saveFound(a){try{localStorage.setItem(LS_FOUND,JSON.stringify(a));}catch{}}
const foundWords=loadFound();

function pickSecret(){
  const lastWord=loadLastWord();
  // Cherche dans SW mélangé à partir de l'index courant
  let tries=0;
  while(tries<SW.length){
    const w=SW[swIndex%SW.length];
    swIndex++;
    if(w!==lastWord) return w;
    tries++;
  }
  // Ultra-fallback
  return SW[Math.floor(Math.random()*SW.length)];
}

// ── Évaluation ────────────────────────────────────────────────────────────
function evaluate(g,s){
  const res=Array(6).fill('absent'),sa=s.split(''),ga=g.split(''),u=Array(6).fill(false);
  for(let i=0;i<6;i++)if(ga[i]===sa[i]){res[i]='correct';u[i]=true;}
  for(let i=0;i<6;i++){if(res[i]==='correct')continue;for(let j=0;j<6;j++)if(!u[j]&&ga[i]===sa[j]){res[i]='present';u[j]=true;break;}}
  return res;
}

// ── Rendu grille ──────────────────────────────────────────────────────────
function renderGrid(){
  const grid=document.getElementById('grid');grid.innerHTML='';
  for(let r=0;r<MAX;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    const g=guesses[r],isActive=!over&&r===guesses.length;
    for(let c=0;c<6;c++){
      const cell=document.createElement('div');cell.className='cell';
      if(g){cell.textContent=g.letters[c];cell.classList.add(g.result[c]);}
      else if(isActive){
        cell.textContent=input[c]||'';
        cell.classList.add('editable');
        if(input[c])cell.classList.add('filled');
        if(c===cursor)cell.classList.add('cursor');
        const col=c;
        cell.addEventListener('pointerdown',e=>{e.preventDefault();moveCursor(col);});
      }
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
}
function moveCursor(pos){if(over)return;cursor=pos;renderGrid();}
function advanceCursor(){
  for(let i=cursor+1;i<6;i++){if(!input[i]){cursor=i;return;}}
  cursor=Math.min(cursor+1,5);
}

// ── Rendu clavier ─────────────────────────────────────────────────────────
const KBR=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L','M'],['VAL','Z','X','C','V','B','N','⌫']];
function renderKb(){
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  const ks={};
  for(const g of guesses)g.letters.split('').forEach((l,i)=>{const c=ks[l],s=g.result[i];if(!c||(c==='absent'&&s!=='absent')||(c==='present'&&s==='correct'))ks[l]=s;});
  for(const row of KBR){
    const kr=document.createElement('div');kr.className='kb-row';
    for(const k of row){
      const key=document.createElement('div');
      key.className='kb-key'+(k==='⌫'?' wide-del':k==='VAL'?' wide-val':'')+(ks[k]?' '+ks[k]:'');
      key.textContent=k==='VAL'?'✔ OK':k;
      key.addEventListener('pointerdown',e=>{e.preventDefault();handleKey(k);});
      kr.appendChild(key);
    }
    kb.appendChild(kr);
  }
}

function norm(w){return w.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toUpperCase().replace(/[^A-Z]/g,"");}

// ── Touches ───────────────────────────────────────────────────────────────
function handleKey(k){
  if(over)return;
  if(k==='⌫'){
    if(input[cursor]){input[cursor]='';}else if(cursor>0){cursor--;input[cursor]='';}
    msg('','');renderGrid();
  }else if(k==='VAL'){submit();}
  else{const l=norm(k);if(l.length!==1)return;input[cursor]=l;advanceCursor();renderGrid();}
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Backspace'){handleKey('⌫');return;}
  if(e.key==='Enter'){handleKey('VAL');return;}
  if(e.key==='ArrowLeft'){if(cursor>0){cursor--;renderGrid();}return;}
  if(e.key==='ArrowRight'){if(cursor<5){cursor++;renderGrid();}return;}
  const l=norm(e.key);if(l.length===1)handleKey(l);
});

// ── Validation ────────────────────────────────────────────────────────────
function submit(){
  if(over)return;
  const word=input.join('');
  if(word.length!==6||input.includes('')){shake(guesses.length);msg("⚠️ Complète les 6 cases d'abord.","error");return;}
  if(!inDict(word)){shake(guesses.length);msg("❌ Mot inconnu du dictionnaire.","error");return;}
  const res=evaluate(word,secret);
  guesses.push({letters:word,result:res});
  input=Array(6).fill('');cursor=0;
  renderGrid();renderKb();
  if(res.every(r=>r==='correct')){over=true;setTimeout(()=>showWin(guesses.length),600);}
  else if(guesses.length>=MAX){
    msg("😢 Perdu ! Le mot était : "+secret,"error");
    over=true;
    setTimeout(()=>{
      document.getElementById('lose-next').style.display='inline-block';
    },400);
  }
  else msg('','');
}
function shake(r){const row=document.getElementById('row-'+r);if(!row)return;row.querySelectorAll('.cell').forEach(c=>{c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');});}
function msg(t,type){const el=document.getElementById('message');el.textContent=t;el.className=type||'';}

// ── Victoire ──────────────────────────────────────────────────────────────
function showWin(n){
  foundWords.push({w:secret,n:n});
  saveFound(foundWords);
  // Affiche le trophée si gagné du premier coup, sinon la photo normale
  const winImg=document.getElementById('win-img');
  const trophyImg=document.getElementById('trophy-img');
  if(n===1){
    winImg.style.display='none';
    trophyImg.style.display='block';
    document.getElementById('win-essais').textContent='';
    document.getElementById('win-caption').querySelector('.stars').textContent='👑 ⚡ 👑';
  } else {
    winImg.style.display='block';
    trophyImg.style.display='none';
    document.getElementById('win-essais').textContent="Trouvé en "+n+" essai"+(n>1?"s":"")+" — tu es le meilleur ! 💪";
    document.getElementById('win-caption').querySelector('.stars').textContent='🏆 ✨ 🏆';
  }
  const board=document.getElementById('win-board');
  board.innerHTML='';
  [...foundWords].reverse().forEach(({w,n})=>{
    const chip=document.createElement('div');
    chip.style.cssText='background:#1a4a1a;border:1px solid #2ecc71;border-radius:6px;padding:4px 8px;font-size:.75rem;font-weight:700;color:#e8f5e8;white-space:nowrap;';
    chip.textContent=w+' ('+n+'✓)';
    board.appendChild(chip);
  });
  const ws=document.getElementById('win-screen');
  ws.style.display='flex';void ws.offsetWidth;ws.classList.add('show');
}

// ── Init ──────────────────────────────────────────────────────────────────
function startRound(){
  input=Array(6).fill('');cursor=0;guesses=[];over=false;
  msg('','');
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('lose-next').style.display='none';
  document.getElementById('loading').style.display='none';
  secret=pickSecret();
  saveLastWord(secret);
  renderGrid();renderKb();
}

function nextWord(){startRound();}

// Bloquer le bouton retour
history.pushState({app:'motmystere'},'');
window.addEventListener('popstate',()=>history.pushState({app:'motmystere'},''));

startRound();

</script>
