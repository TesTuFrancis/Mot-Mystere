<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Mot Mystère</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap');
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#1a3a1a;color:#f0eee8;font-family:'Space Grotesk',sans-serif;
         height:100dvh;display:flex;flex-direction:column;align-items:center;
         padding:14px 16px 10px;gap:10px;overflow:hidden;}

    header{text-align:center;flex-shrink:0;}
    header h1{font-size:1.45rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#e8f5e8;}
    header p{margin-top:2px;font-size:.7rem;color:#7aaa7a;letter-spacing:.04em;}

    .legend{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;flex-shrink:0;}
    .legend-item{display:flex;align-items:center;gap:5px;font-size:.7rem;color:#9aba9a;}
    .legend-box{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;
                justify-content:center;font-weight:700;font-size:.65rem;}
    .lb-absent {background:#2a3a2a;color:#4a6a4a;border:2px solid #2a4a2a;}
    .lb-present{background:#7c6a00;color:#ffd166;border:2px solid #ffd166;}
    .lb-correct{background:#145a32;color:#2ecc71;border:2px solid #2ecc71;}

    #grid{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
    .row{display:flex;gap:6px;}
    .cell{width:48px;height:48px;border-radius:6px;display:flex;align-items:center;
          justify-content:center;font-size:1.3rem;font-weight:700;text-transform:uppercase;
          border:2px solid #2a4a2a;background:#122212;color:#e8f5e8;}
    .cell.editable{cursor:pointer;}
    .cell.cursor{border-color:#ffffff!important;background:#1e3a1e!important;box-shadow:0 0 0 2px rgba(255,255,255,.25);}
    .cell.filled{border-color:#6aaa6a;}
    .cell.absent {background:#2a3a2a;color:#4a6a4a;border-color:#2a4a2a;}
    .cell.present{background:#7c6a00;color:#ffd166;border-color:#ffd166;}
    .cell.correct{background:#145a32;color:#2ecc71;border-color:#2ecc71;}
    .cell.shake{animation:shake .4s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}
      40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

    #message{min-height:18px;font-size:.82rem;font-weight:600;text-align:center;
             padding:0 8px;flex-shrink:0;color:#ffd166;}
    #message.error{color:#ff6b6b;}
    #message.success{color:#2ecc71;}

    #keyboard-zone{width:100%;max-width:420px;display:flex;flex-direction:column;
                   align-items:center;gap:6px;flex-shrink:0;margin-top:auto;}
    #keyboard{display:flex;flex-direction:column;gap:5px;width:100%;}
    .kb-row{display:flex;gap:4px;justify-content:center;}
    .kb-key{flex:1;max-width:36px;height:46px;border-radius:5px;display:flex;
            align-items:center;justify-content:center;font-size:.78rem;font-weight:700;
            text-transform:uppercase;background:#2a3a2a;color:#c8e8c8;border:1px solid #3a5a3a;
            cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
    .kb-key.wide-del{max-width:48px;font-size:1rem;}
    .kb-key.wide-val{max-width:72px;font-size:.68rem;background:#1a6a1a;color:#fff;border-color:#2ecc71;}
    .kb-key:active{filter:brightness(1.3);}
    .kb-key.absent {background:#1a2a1a;color:#3a5a3a;border-color:#1a3a1a;}
    .kb-key.present{background:#7c6a00;color:#ffd166;border-color:#ffd166;}
    .kb-key.correct{background:#145a32;color:#2ecc71;border-color:#2ecc71;}

    /* ── LOSE BUTTON ── */
    #lose-next{display:none;background:#7b68ee;color:#fff;border:none;border-radius:8px;
               font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;
               padding:11px 30px;cursor:pointer;margin-top:4px;}

    /* ── OVERLAY BASE ── */
    .overlay{position:fixed;inset:0;display:none;flex-direction:column;
             align-items:center;z-index:200;opacity:0;transition:opacity .6s ease;}
    .overlay.show{display:flex;opacity:1;}

    /* ── SCREEN 1 : IMAGE ── */
    #win-img-screen{background:#000;justify-content:flex-end;}
    #win-img-screen img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:contain;object-position:center;
    }
    #win-img-bar{
      position:relative;z-index:2;
      width:100%;background:rgba(0,0,0,.55);
      padding:10px 20px 14px;text-align:center;
      display:flex;flex-direction:column;align-items:center;gap:8px;
    }
    #win-img-label{font-size:.95rem;font-weight:600;color:#e8f5e8;letter-spacing:.04em;}
    #win-img-btn{background:#2ecc71;color:#0a1a0a;border:none;border-radius:8px;
                 font-family:'Space Grotesk',sans-serif;font-size:.9rem;font-weight:700;
                 padding:9px 28px;cursor:pointer;}

    /* ── SCREEN 2 : BOARD ── */
    #win-board-screen{background:#0d200d;justify-content:center;gap:0;}
    #win-board-inner{
      width:100%;max-width:420px;height:100%;
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:24px 20px;gap:16px;
    }
    #win-board-title{font-size:1rem;font-weight:700;color:#2ecc71;letter-spacing:.08em;}
    #win-board-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
                     overflow-y:auto;max-height:60vh;}
    .chip{background:#1a4a1a;border:1px solid #2ecc71;border-radius:7px;
          padding:5px 10px;font-size:.78rem;font-weight:700;color:#e8f5e8;white-space:nowrap;}
    #win-board-btn{background:#2ecc71;color:#0a1a0a;border:none;border-radius:8px;
                   font-family:'Space Grotesk',sans-serif;font-size:.95rem;font-weight:700;
                   padding:12px 34px;cursor:pointer;flex-shrink:0;}

    /* ── LOADING ── */
    #loading{position:fixed;inset:0;background:#0d200d;display:flex;
             flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}
    #loading p{color:#7aaa7a;font-size:.9rem;}
    .spinner{width:36px;height:36px;border:3px solid #2a4a2a;border-top-color:#2ecc71;
             border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Chargement…</p></div>

  const grid=document.getElementById('grid');grid.innerHTML='';
  for(let r=0;r<MAX;r++){
    const row=document.createElement('div');row.className='row';row.id='row-'+r;
    const g=guesses[r],isActive=!over&&r===guesses.length;
    for(let c=0;c<6;c++){
      const cell=document.createElement('div');cell.className='cell';
      if(g){cell.textContent=g.letters[c];cell.classList.add(g.result[c]);}
      else if(isActive){
        cell.textContent=input[c]||'';cell.classList.add('editable');
        if(input[c])cell.classList.add('filled');
        if(c===cursor)cell.classList.add('cursor');
        const col=c;cell.addEventListener('pointerdown',e=>{e.preventDefault();moveCursor(col);});
      }
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
}
function moveCursor(pos){if(over)return;cursor=pos;renderGrid();}
function advanceCursor(){for(let i=cursor+1;i<6;i++){if(!input[i]){cursor=i;return;}}cursor=Math.min(cursor+1,5);}

const KBR=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L','M'],['VAL','Z','X','C','V','B','N','⌫']];
function renderKb(){
  const kb=document.getElementById('keyboard');kb.innerHTML='';
  const ks={};
  for(const g of guesses)g.letters.split('').forEach((l,i)=>{const c=ks[l],s=g.result[i];if(!c||(c==='absent'&&s!=='absent')||(c==='present'&&s==='correct'))ks[l]=s;});
  for(const row of KBR){
    const kr=document.createElement('div');kr.className='kb-row';
    for(const k of row){
      const key=document.createElement('div');
      key.className='kb-key'+(k==='⌫'?' wide-del':k==='VAL'?' wide-val':'')+(ks[k]?' '+ks[k]:'');
      key.textContent=k==='VAL'?'✔ OK':k;
      key.addEventListener('pointerdown',e=>{e.preventDefault();handleKey(k);});
      kr.appendChild(key);
    }
    kb.appendChild(kr);
  }
}

function norm(w){return w.normalize("NFD").replace(/[̀-ͯ]/g,"").toUpperCase().replace(/[^A-Z]/g,"");}
function handleKey(k){
  if(over)return;
  if(k==='⌫'){if(input[cursor]){input[cursor]='';}else if(cursor>0){cursor--;input[cursor]='';}msg('','');renderGrid();}
  else if(k==='VAL')submit();
  else{const l=norm(k);if(l.length!==1)return;input[cursor]=l;advanceCursor();renderGrid();}
}
document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  if(e.key==='Backspace'){handleKey('⌫');return;}
  if(e.key==='Enter'){handleKey('VAL');return;}
  if(e.key==='ArrowLeft'){if(cursor>0){cursor--;renderGrid();}return;}
  if(e.key==='ArrowRight'){if(cursor<5){cursor++;renderGrid();}return;}
  const l=norm(e.key);if(l.length===1)handleKey(l);
});

function submit(){
  if(over)return;
  const word=input.join('');
  if(word.length!==6||input.includes('')){shake(guesses.length);msg("⚠️ Complète les 6 cases.","error");return;}
  if(!inDict(word)){shake(guesses.length);msg("❌ Mot inconnu du dictionnaire.","error");return;}
  const res=evaluate(word,secret);
  guesses.push({letters:word,result:res});
  input=Array(6).fill('');cursor=0;
  renderGrid();renderKb();
  if(res.every(r=>r==='correct')){over=true;setTimeout(()=>showWin(guesses.length),600);}
  else if(guesses.length>=MAX){
    over=true;
    foundWords.push({w:secret,n:0,lost:true,g:guesses.map(x=>({l:x.letters,r:x.result}))});
    saveFound(foundWords);
    msg("😢 Perdu ! Le mot était : "+secret,"error");
    setTimeout(()=>{document.getElementById('lose-next').style.display='inline-block';},400);
  }else msg('','');
}
function shake(r){const row=document.getElementById('row-'+r);if(!row)return;row.querySelectorAll('.cell').forEach(c=>{c.classList.remove('shake');void c.offsetWidth;c.classList.add('shake');});}
function msg(t,type){const el=document.getElementById('message');el.textContent=t;el.className=type||'';}

// ── Victoire ──────────────────────────────────────────────────────────────
function showWin(n){
  foundWords.push({w:secret,n:n,g:guesses.map(x=>({l:x.letters,r:x.result}))});
  saveFound(foundWords);
  // Choisit l'image
  const imgMap={1:'wimg-1',2:'wimg-2',3:'wimg-3',4:'wimg-4'};
  const imgId=imgMap[n]||'wimg-5';
  ['wimg-1','wimg-2','wimg-3','wimg-4','wimg-5'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById(imgId).style.display='block';
  // Label
  const labels={1:'👑 Trouvé du premier coup !',2:'🔵 Trouvé en 2 essais !',
                 3:'🟣 Trouvé en 3 essais !',4:'⭐ Trouvé en 4 essais !'};
  document.getElementById('win-img-label').textContent=labels[n]||('Trouvé en '+n+' essais !');
  // Affiche l'écran image
  const sc=document.getElementById('win-img-screen');
  sc.style.display='flex';void sc.offsetWidth;sc.classList.add('show');
}

function showBoard(){
  // Cache l'écran image
  const sc1=document.getElementById('win-img-screen');
  sc1.classList.remove('show');
  sc1.style.display='none';
  // Construit les chips
  const chips=document.getElementById('win-board-chips');
  chips.innerHTML='';
  const rev=[...foundWords].reverse();
  rev.forEach((entry,ri)=>{const {w,n}=entry;const origIdx=foundWords.length-1-ri;
    const c=document.createElement('div');c.className='chip';
    if(entry.lost){
      c.style.cssText='background:#3a1a1a;border:1px solid #ff6b6b;border-radius:7px;padding:5px 10px;font-size:.78rem;font-weight:700;color:#ff6b6b;white-space:nowrap;';
      c.textContent=w+' ✗';
    } else {
      c.textContent=w+' ('+n+'✓)';
    }
    c.style.cursor='pointer';
    c.title='Voir la partie';
    (function(i){c.addEventListener('click',()=>showReplay(i));})(origIdx);
    chips.appendChild(c);
  });
  // Affiche l'écran board
  const sc2=document.getElementById('win-board-screen');
  sc2.style.display='flex';void sc2.offsetWidth;sc2.classList.add('show');
}

// ── Replay ───────────────────────────────────────────────────────────────
function showReplay(idx){
  const entry=foundWords[idx];
  if(!entry||!entry.g) return;
  // Title
  const titleEl=document.getElementById('replay-title');
  if(entry.lost) titleEl.textContent='❌ '+entry.w+' — Non trouvé';
  else titleEl.textContent=(entry.n===1?'👑':'🏅')+' '+entry.w+' — Trouvé en '+entry.n+' essai'+(entry.n>1?'s':'')+'!';
  // Build grid
  const grid=document.getElementById('replay-grid');
  grid.innerHTML='';
  for(let r=0;r<6;r++){
    const row=document.createElement('div');
    row.style.cssText='display:flex;gap:6px;';
    const g=entry.g[r];
    for(let c=0;c<6;c++){
      const cell=document.createElement('div');
      cell.style.cssText='width:44px;height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;text-transform:uppercase;border:2px solid #2a4a2a;background:#122212;color:#e8f5e8;';
      if(g){
        cell.textContent=g.l[c];
        const colors={correct:'background:#145a32;color:#2ecc71;border-color:#2ecc71;',
                      present:'background:#7c6a00;color:#ffd166;border-color:#ffd166;',
                      absent:'background:#2a3a2a;color:#4a6a4a;border-color:#2a4a2a;'};
        cell.style.cssText+=colors[g.r[c]]||'';
      }
      row.appendChild(cell);
    }
    grid.appendChild(row);
  }
  // Show screen
  const sc=document.getElementById('win-replay-screen');
  sc.style.display='flex';void sc.offsetWidth;sc.classList.add('show');
}
function closeReplay(){
  const sc=document.getElementById('win-replay-screen');
  sc.classList.remove('show');sc.style.display='none';
}

// ── Init ──────────────────────────────────────────────────────────────────
function startRound(){
  input=Array(6).fill('');cursor=0;guesses=[];over=false;
  msg('','');
  document.getElementById('lose-next').style.display='none';
  // Cache les overlays
  ['win-img-screen','win-board-screen','win-replay-screen'].forEach(id=>{
    const el=document.getElementById(id);el.classList.remove('show');el.style.display='none';
  });
  document.getElementById('loading').style.display='none';
  secret=pickSecret();saveLastWord(secret);
  renderGrid();renderKb();
}
function nextWord(){startRound();}

history.pushState({app:'motmystere'},'');
window.addEventListener('popstate',()=>history.pushState({app:'motmystere'},''));

startRound();
</script>
